{% extends "base.html" %}

{% block title %}Driver Standings | F1 Predictor{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Driver Standings</h1>
        <p class="text-[#8B8B9A] text-lg">Current championship battle.</p>
    </div>
    <div class="flex gap-2 w-full md:w-auto">
        <div class="relative w-full md:w-64">
            <input type="text" placeholder="Search drivers..." 
                   hx-get="{% url 'driver_standings' %}" 
                   hx-target="#standings-tbody" 
                   hx-trigger="keyup changed delay:500ms"
                   name="q"
                   class="w-full bg-black/20 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-white placeholder-[#8B8B9A] focus:outline-none focus:border-[#E10600] focus:ring-1 focus:ring-[#E10600] transition-colors">
            <svg class="absolute left-3 top-2.5 w-5 h-5 text-[#8B8B9A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
    </div>
</div>

<div class="glass rounded-2xl overflow-hidden border border-white/10">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[600px]">
            <thead>
                <tr class="border-b border-white/10 bg-black/20 text-xs uppercase tracking-wider text-[#8B8B9A]">
                    <th class="py-4 px-6 font-semibold w-16 text-center">Pos</th>
                    <th class="py-4 px-6 font-semibold">Driver</th>
                    <th class="py-4 px-6 font-semibold hidden sm:table-cell">Team</th>
                    <th class="py-4 px-6 font-semibold text-center">Wins</th>
                    <th class="py-4 px-6 font-semibold text-center">Podiums</th>
                    <th class="py-4 px-6 font-semibold text-right text-[#00D2BE]">Pts</th>
                </tr>
            </thead>
            <tbody id="standings-tbody" class="divide-y divide-white/5">
                {% include "partials/driver_search_results.html" with standings=standings %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
