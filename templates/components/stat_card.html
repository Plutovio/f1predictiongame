<div class="glass p-5 rounded-2xl relative overflow-hidden group hover:bg-white/10 transition-colors h-full flex flex-col">
    <div class="absolute top-0 right-0 w-32 h-32 bg-{{ stat.color|default:'[#00D2BE]' }} opacity-5 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform duration-500 blur-xl"></div>
    <div class="relative z-10 flex flex-col h-full justify-between">
        <div class="flex items-center justify-between mb-4">
            <div class="p-2 rounded-lg bg-white/5 border border-white/10">
                <svg class="w-6 h-6 text-{{ stat.color|default:'[#00D2BE]' }}" fill="none" stroke="currentColor" viewBox="0 0 24 24" {{ stat.icon_svg|safe }}></svg>
            </div>
            {% if stat.trend %}
            <div class="flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-full {% if stat.trend > 0 %}text-green-400 bg-green-400/10{% elif stat.trend < 0 %}text-red-400 bg-red-400/10{% else %}text-gray-400 bg-gray-400/10{% endif %}">
                {% if stat.trend > 0 %}
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                {% elif stat.trend < 0 %}
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6"></path></svg>
                {% else %}
                <span>-</span>
                {% endif %}
                <span>{{ stat.trend|default:0|absolute }}%</span>
            </div>
            {% endif %}
        </div>
        <div>
            <div class="text-sm font-medium text-[#8B8B9A] mb-1">{{ stat.title }}</div>
            <div class="text-3xl font-mono font-bold text-white">{{ stat.value }}</div>
            {% if stat.subtitle %}
            <div class="text-xs text-[#8B8B9A] mt-1">{{ stat.subtitle }}</div>
            {% endif %}
        </div>
    </div>
</div>
