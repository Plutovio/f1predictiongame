<div class="glass rounded-lg p-4 shadow-lg flex items-center gap-3 border-l-4 {% if message.tags == 'success' %}border-l-[#00D2BE]{% elif message.tags == 'error' %}border-l-[#E10600]{% elif message.tags == 'warning' %}border-l-[#FFD700]{% else %}border-l-blue-500{% endif %} transform transition-all duration-300"
     x-data="{ show: true }" 
     x-show="show" 
     x-init="setTimeout(() => show = false, 5000)"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 translate-x-full"
     x-transition:enter-end="opacity-100 translate-x-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-x-0"
     x-transition:leave-end="opacity-0 translate-x-full">
    <div class="flex-grow text-sm font-medium text-white">
        {{ message }}
    </div>
    <button @click="show = false" class="text-white/50 hover:text-white focus:outline-none">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
</div>
