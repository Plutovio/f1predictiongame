<div class="glass holo-card p-6 rounded-2xl flex flex-col sm:flex-row items-center gap-6 group"
     style="--card-glow-color: {{ driver.current_team.color_primary|default:'#ffffff' }}; border-left: 4px solid {{ driver.current_team.color_primary|default:'#ffffff' }};">
    <div class="relative w-16 h-16 flex-shrink-0">
        <div class="absolute inset-0 rounded-full opacity-20 group-hover:scale-110 transition-transform blur-md"
             style="background-color: {{ driver.current_team.color_primary|default:'#ffffff' }};"></div>
        <div class="relative w-full h-full rounded-full border border-white/20 flex items-center justify-center bg-[#15151E] overflow-hidden">
            {% if driver.image_url %}
            <img src="{{ driver.image_url }}" alt="{{ driver.last_name }}" class="w-full h-full object-cover">
            {% else %}
            <span class="text-xl font-bold">{{ driver.abbreviation|default:driver.last_name|slice:":3"|upper }}</span>
            {% endif %}
        </div>
    </div>
    <div class="flex-grow text-center sm:text-left">
        <div class="flex items-center justify-center sm:justify-start gap-2 mb-1">
            <span class="text-2xl font-bold">{{ driver.first_name }} {{ driver.last_name }}</span>
            <span class="font-mono text-sm px-2 py-0.5 rounded glass text-[#00D2BE] border-none">{{ driver.number }}</span>
        </div>
        <div class="text-[#8B8B9A] font-semibold">{{ driver.team }}</div>
    </div>
    <div class="flex items-center gap-6">
        <div class="text-center">
            <div class="text-xs text-[#8B8B9A] uppercase tracking-wider mb-1">Points</div>
            <div class="text-2xl font-mono font-bold">{{ driver.points|default:"0" }}</div>
        </div>
        <div class="text-center">
            <div class="text-xs text-[#8B8B9A] uppercase tracking-wider mb-1">Pos</div>
            <div class="text-2xl font-mono font-bold {% if driver.position == 1 %}text-[#FFD700]{% elif driver.position == 2 %}text-[#C0C0C0]{% elif driver.position == 3 %}text-[#CD7F32]{% endif %}">
                {{ driver.position|default:"-" }}
            </div>
        </div>
    </div>
</div>
