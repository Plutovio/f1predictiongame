{% extends "base.html" %}

{% block title %}Email Sent | F1 Predictor{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="glass w-full max-w-md p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#00D2BE]/20 rounded-full -mr-16 -mt-16 blur-2xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-[#E10600]/20 rounded-full -ml-16 -mb-16 blur-2xl pointer-events-none"></div>
        
        <div class="relative z-10 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-500/10 border border-green-500/20 mb-6 text-green-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l8-4.8a2 2 0 012.22 0l8 4.8A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"></path></svg>
            </div>
            
            <h1 class="text-2xl font-bold text-white mb-3">Reset Email Sent</h1>
            <p class="text-[#8B8B9A] mb-8 leading-relaxed">We've sent an email with instructions for resetting your password. If an account exists with this email address, you'll receive it shortly.</p>
            
            <a href="{% url 'login' %}" class="inline-block bg-[#E10600] hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-lg shadow-red-500/20">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
