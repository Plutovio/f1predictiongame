{% extends "base.html" %}

{% block title %}Password Reset Complete | F1 Predictor{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="glass w-full max-w-md p-8 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#00D2BE]/20 rounded-full -mr-16 -mt-16 blur-2xl pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-[#E10600]/20 rounded-full -ml-16 -mb-16 blur-2xl pointer-events-none"></div>
        
        <div class="relative z-10 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-500/10 border border-green-500/20 mb-6 text-green-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            
            <h1 class="text-2xl font-bold text-white mb-3">Password Reset Complete</h1>
            <p class="text-[#8B8B9A] mb-8 leading-relaxed">Your password has been successfully reset! You can now log in with your new password.</p>
            
            <a href="{% url 'login' %}" class="inline-block bg-[#00D2BE] hover:bg-teal-500 text-black font-bold py-3 px-8 rounded-lg transition-colors shadow-lg shadow-[#00D2BE]/20">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
