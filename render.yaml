databases:
  - name: f1predictor-db
    plan: free
    databaseName: f1predictor
    user: f1predictor

services:
  # Web Service
  - type: web
    name: f1predictor
    env: python
    plan: free
    # Build: install deps and collect static assets only (CSS is pre-compiled and committed)
    # Database operations moved to startCommand (start.sh) so DATABASE_URL is available
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    # Start: runs migrations + seeding + gunicorn with full DB access
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: f1predictor-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: f1predictor.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DEBUG
        value: "False"
      - key: FASTF1_CACHE_DIR
        value: /tmp/fastf1_cache

  # Celery Worker (optional - requires paid plan for background workers)
  # Uncomment if you have a paid Render plan
